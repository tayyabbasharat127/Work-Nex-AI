name: Build & Deploy to Google Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_REGION: asia-south1
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Backend ──────────────────────────────────────────
      - name: Build & push backend image
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/worknex/backend:${{ github.sha }} \
            ./worknex-backend
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/worknex/backend:${{ github.sha }}

      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: worknex-backend
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/worknex/backend:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            POWERBI_CLIENT_ID=${{ secrets.POWERBI_CLIENT_ID }}
            POWERBI_CLIENT_SECRET=${{ secrets.POWERBI_CLIENT_SECRET }}
            POWERBI_TENANT_ID=${{ secrets.POWERBI_TENANT_ID }}
            POWERBI_WORKSPACE_ID=${{ secrets.POWERBI_WORKSPACE_ID }}

      # ── AI Service ───────────────────────────────────────
      - name: Build & push AI service image
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/worknex/ai-service:${{ github.sha }} \
            ./ai-service
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/worknex/ai-service:${{ github.sha }}

      - name: Deploy AI service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: worknex-ai
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/worknex/ai-service:${{ github.sha }}
          env_vars: |
            DEBUG=false
            HOST=0.0.0.0
            PORT=8000
            AI_PROVIDER=statistical
            EMBEDDING_PROVIDER=deterministic

      # ── Frontend ─────────────────────────────────────────
      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe worknex-backend --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Get AI service URL
        id: ai-url
        run: |
          URL=$(gcloud run services describe worknex-ai --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Build & push frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }}/api/v1 \
            --build-arg NEXT_PUBLIC_AI_URL=${{ steps.ai-url.outputs.url }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/worknex/frontend:${{ github.sha }} \
            ./frontend
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/worknex/frontend:${{ github.sha }}

      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: worknex-frontend
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/worknex/frontend:${{ github.sha }}

      - name: Print deployed URLs
        run: |
          echo "Backend: $(gcloud run services describe worknex-backend --region=${{ env.GCP_REGION }} --format='value(status.url)')"
          echo "AI: $(gcloud run services describe worknex-ai --region=${{ env.GCP_REGION }} --format='value(status.url)')"
          echo "Frontend: $(gcloud run services describe worknex-frontend --region=${{ env.GCP_REGION }} --format='value(status.url)')"
