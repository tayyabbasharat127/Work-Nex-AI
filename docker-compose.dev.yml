# WorkNex AI — DEVELOPMENT Docker Compose
# Hot-reload for all services. Code changes apply instantly.
#
# First time / after adding packages:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Normal daily start:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    command: sh -c "npx prisma migrate deploy && node src/app.js"
    environment:
      NODE_ENV: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"
      AI_PROVIDER: ${AI_PROVIDER:-langchain}
      GROK_API_KEY: ${GROK_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      LANGCHAIN_MODEL: ${LANGCHAIN_MODEL:-}
      LANGCHAIN_VERBOSE: ${LANGCHAIN_VERBOSE:-false}
      BACKEND_TOKEN: ${BACKEND_TOKEN:-}
      BACKEND_URL: http://backend:5000/api/v1
    volumes:
      - ./ai-service/app:/app/app
      - ./ai-service/knowledge:/app/knowledge
      - ./ai-service/models:/app/models
      - ./ai-service/vector_store:/app/vector_store

  multi-agent:
    build:
      context: ./multi-agent-service
      dockerfile: Dockerfile
    command: node --watch server.js
    environment:
      NODE_ENV: development
      PORT: 8010
      WORKNEX_BACKEND_API_URL: http://backend:5000/api/v1
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      AGENT_MEMORY_ALLOW_IN_MEMORY_FALLBACK: "true"
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./multi-agent-service/agents:/app/agents
      - ./multi-agent-service/config:/app/config
      - ./multi-agent-service/handlers:/app/handlers
      - ./multi-agent-service/routing:/app/routing
      - ./multi-agent-service/tools:/app/tools
      - ./multi-agent-service/server.js:/app/server.js

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    command: sh -c "node_modules/.bin/next dev"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
      NEXT_PUBLIC_AI_URL: ${NEXT_PUBLIC_AI_URL:-http://localhost:8000}
      NEXT_PUBLIC_MULTI_AGENT_API_URL: ${NEXT_PUBLIC_MULTI_AGENT_API_URL:-http://localhost:8010}
      NEXT_PUBLIC_APP_NAME: WorkNex AI
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/hooks:/app/hooks
      - ./frontend/services:/app/services
      - ./frontend/styles:/app/styles
      - ./frontend/public:/app/public
      - ./frontend/contexts:/app/contexts
