services:
  postgres:
    image: postgres:15-alpine
    container_name: worknex-db
    environment:
      POSTGRES_USER: worknex
      POSTGRES_PASSWORD: worknex_pass
      POSTGRES_DB: worknex_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./worknex-backend/scripts/postgres/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worknex -d worknex_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./worknex-backend
      dockerfile: Dockerfile
    container_name: worknex-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://worknex:worknex_pass@postgres:5432/worknex_prod
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 30d
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@worknexai.com}
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      TMS_API_URL: http://backend:5000/tms-mock
      POWERBI_CLIENT_ID: ${POWERBI_CLIENT_ID:-}
      POWERBI_CLIENT_SECRET: ${POWERBI_CLIENT_SECRET:-}
      POWERBI_TENANT_ID: ${POWERBI_TENANT_ID:-}
      POWERBI_WORKSPACE_ID: ${POWERBI_WORKSPACE_ID:-}
      POWERBI_REPORT_ID: ${POWERBI_REPORT_ID:-}
      POWERBI_DATASET_ID: ${POWERBI_DATASET_ID:-}
      POWERBI_EMBED_URL: ${POWERBI_EMBED_URL:-}
      ETL_ENABLED: "true"
      ETL_CRON_SCHEDULE: "0 2 * * *"
      ETL_MONTHLY_SCHEDULE: "0 3 1 * *"
      ETL_TIMEZONE: Asia/Karachi
      TZ_OFFSET_HOURS: 5
      LATE_THRESHOLD_HOUR: 9
      LATE_THRESHOLD_MIN: 30
    ports:
      - "5000:5000"
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: worknex-ai
    environment:
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: "8000"
      BACKEND_URL: http://backend:5000/api/v1
      JWT_SECRET: ${JWT_SECRET}
      AI_PROVIDER: ${AI_PROVIDER:-statistical}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      LANGCHAIN_MODEL: ${LANGCHAIN_MODEL:-}
      LANGCHAIN_VERBOSE: ${LANGCHAIN_VERBOSE:-false}
    expose:
      - "8000"
    restart: unless-stopped

  multi-agent:
    build:
      context: ./multi-agent-service
      dockerfile: Dockerfile
    container_name: worknex-multi-agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8010
      NODE_ENV: production
      WORKNEX_BACKEND_API_URL: http://backend:5000/api/v1
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      AGENT_MEMORY_PROVIDER: postgres
      AGENT_MEMORY_DATABASE_URL: postgresql://worknex:worknex_pass@postgres:5432/worknex_agent_memory
      AGENT_MEMORY_ALLOW_IN_MEMORY_FALLBACK: "true"
      AGENT_REQUEST_TIMEOUT_MS: 30000
      AGENT_RECURSION_LIMIT: 8
      AGENT_MAX_SUPERVISOR_TURNS: 4
      AGENT_MAX_TOOL_CALLS: 6
      AGENT_MAX_ESTIMATED_TOKENS: 8000
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
    ports:
      - "8010:8010"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
        NEXT_PUBLIC_AI_URL: ${NEXT_PUBLIC_AI_URL:-http://localhost:8000}
        NEXT_PUBLIC_MULTI_AGENT_API_URL: ${NEXT_PUBLIC_MULTI_AGENT_API_URL:-http://localhost:8010}
        NEXT_PUBLIC_APP_NAME: WorkNex AI
    container_name: worknex-frontend
    depends_on:
      - backend
      - multi-agent
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: worknex-network
