  <line x1="16" y1="11" x2="23" y2="22" stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="9"  y1="22" x2="23" y2="22" stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.5"/>
